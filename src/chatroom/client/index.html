<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chat</title>
    <link rel="stylesheet" href="templates/style.css">
  </head>
  <body>
    <div class="app-container">
      <nav class="navbar">
        <a href="/" class="back-button">
          <span class="icon">←</span> Back
        </a>
      </nav>
      <div id="login-overlay" class="overlay">
        <div class="login-box">
          <h2>Choose a Username</h2>
          <input type="text" id="username-input" placeholder="Username..." autocomplete="off">
          <button id="login-button">Join Chat</button>
        </div>
      </div>
      <header class="chat-header">
        <h1>Chat</h1>
        <button id="theme-toggle" aria-label="Toggle dark mode">
          <span class="icon">🌓</span>
        </button>
      </header>
      
      <main class="chatbox" id="chatbox">
        <p class="system-message">Welcome to the chat!</p>
      </main>    

      <footer class="input-container">
        <input type="text" id="chat" placeholder="Type a message..." autocomplete="off">
        <button id="send_button">Send</button>
      </footer>
    </div>
    <script type="module" src="static/chatroom.mjs"></script>
  </body>
</html>
